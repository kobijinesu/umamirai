<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0A4D3C"/>

  <!-- Decorative border -->
  <rect x="20" y="20" width="1160" height="590" rx="12" fill="none" stroke="#D4AF37" stroke-width="3" opacity="0.6"/>

  <!-- Gold accent top stripe -->
  <rect x="0" y="0" width="1200" height="8" fill="#D4AF37"/>
  <rect x="0" y="622" width="1200" height="8" fill="#D4AF37"/>

  <!-- Horse silhouette (decorative, right side) -->
  <g transform="translate(820, 100) scale(3.5)" opacity="0.15" fill="#D4AF37">
    <ellipse cx="17" cy="19" rx="7" ry="5"/>
    <rect x="12" y="11" width="4" height="9" rx="2"/>
    <ellipse cx="11" cy="9" rx="3" ry="4"/>
    <polygon points="9,5 11,5 10,2"/>
    <rect x="11" y="23" width="2" height="5" rx="1"/>
    <rect x="15" y="23" width="2" height="5" rx="1"/>
    <rect x="19" y="23" width="2" height="5" rx="1"/>
    <rect x="22" y="22" width="2" height="5" rx="1"/>
    <path d="M24 17 Q29 14 28 20" stroke="#D4AF37" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Main logo text -->
  <text
    x="100"
    y="290"
    font-family="'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif"
    font-size="130"
    font-weight="700"
    fill="#D4AF37"
    letter-spacing="8"
  >うまミライ</text>

  <!-- Gold underline -->
  <rect x="100" y="320" width="780" height="5" fill="#D4AF37" opacity="0.8" rx="2"/>

  <!-- Subtitle -->
  <text
    x="100"
    y="400"
    font-family="'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif"
    font-size="44"
    font-weight="400"
    fill="#FFFFFF"
    opacity="0.9"
    letter-spacing="4"
  >地方競馬AI予想メディア</text>

  <!-- Tagline -->
  <text
    x="100"
    y="470"
    font-family="'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif"
    font-size="28"
    font-weight="300"
    fill="#D4AF37"
    opacity="0.75"
    letter-spacing="2"
  >中央で勝てない方へ、地方の穴を見つけるAI予想</text>

  <!-- Domain -->
  <text
    x="100"
    y="560"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="28"
    font-weight="400"
    fill="#FFFFFF"
    opacity="0.5"
    letter-spacing="1"
  >umamirai.com</text>
</svg>
